name: CI - Lista 03

on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v3

      - name: 🔒 Verificar alterações nos testes
        run: |
          CHANGED_TESTS=$(git diff --name-only origin/main...HEAD | grep '^tests/' || true)
          if [ ! -z "$CHANGED_TESTS" ]; then
            echo "❌ Não é permitido alterar os testes!"
            echo "$CHANGED_TESTS"
            exit 1
          fi

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: 🎛 Rodar linter (flake8)
        run: flake8 src tests

      - name: 🧪 Rodar testes
        run: pytest -v --timeout=2
